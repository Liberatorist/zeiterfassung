name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'zeiterfassung*'

env:
  MAVEN_ARGS: "--no-transfer-progress --errors --fail-at-end --show-version"

jobs:
  publish-docker-image-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-publish
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: 'liberica'
          java-version-file: ".tool-versions"
          cache: 'maven'

      - name: Publish docker image to Docker Hub
        run: >
          ./mvnw
          spring-boot:build-image
          -DskipTests
          -Dspring-boot.build-image.publish=true
          -Ddocker-publish-image-name=${{ secrets.DOCKER_ZE_IMAGE_NAME }}:${{ github.sha }}
          -Ddocker-publish-registry-username=${{ secrets.DOCKER_ZE_USERNAME }}
          -Ddocker-publish-registry-password=${{ secrets.DOCKER_ZE_TOKEN }}

  publish-docker-image-release:
    if: startsWith(github.ref, 'refs/tags/zeiterfassung')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          distribution: 'liberica'
          java-version-file: ".tool-versions"
          cache: 'maven'

      - name: Publish docker image to Docker Hub
        run: >
          ./mvnw
          spring-boot:build-image
          -DskipTests
          -Dspring-boot.build-image.publish=true
          -Ddocker-publish-image-name=${{ secrets.DOCKER_ZE_IMAGE_NAME }}:latest
          -Ddocker-publish-registry-username=${{ secrets.DOCKER_ZE_USERNAME }}
          -Ddocker-publish-registry-password=${{ secrets.DOCKER_ZE_TOKEN }}
